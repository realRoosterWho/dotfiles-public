set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

# Core behavior
set -g mouse on
setw -g mode-keys vi
set -g history-limit 100000
set -g set-clipboard on
set -s escape-time 10

# Truecolor and terminal hints
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

# macOS gets a login shell reattached to the user namespace.
if-shell 'uname | grep -q Darwin' 'set-option -g default-command "reattach-to-user-namespace -l zsh"'

# Splits and movement
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Clipboard integration on macOS.
if-shell 'command -v pbcopy >/dev/null 2>&1' "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '/usr/bin/pbcopy'"
if-shell 'command -v pbcopy >/dev/null 2>&1' "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel '/usr/bin/pbcopy'"
if-shell 'command -v pbcopy >/dev/null 2>&1' "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel '/usr/bin/pbcopy'"
if-shell 'command -v pbcopy >/dev/null 2>&1' "bind-key -T root MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel '/usr/bin/pbcopy'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run -b '~/.tmux/plugins/tpm/tpm'

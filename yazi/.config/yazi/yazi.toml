# Yazi main configuration

[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 6
mouse_events = ["click", "scroll", "touch", "move", "drag"]
title_format = "Yazi: {cwd}"

[preview]
wrap = "yes"
tab_size = 2
max_width = 2000
max_height = 2000
cache_dir = ""
image_delay = 30
image_filter = "lanczos3"
image_quality = 90
sixel_fraction = 12

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Edit with nvim", for = "unix" },
]
open = [
  { run = 'open %s', orphan = true, desc = "Open", for = "macos" },
]
reveal = [
  { run = 'open -R %s', orphan = true, desc = "Reveal in Finder", for = "macos" },
]
play = [
  { run = 'open %s', orphan = true, desc = "Play", for = "macos" },
]
extract = [
  { run = 'ouch decompress %s', desc = "Extract here", for = "unix" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/{json,ndjson,xml,toml,yaml,javascript,typescript}", use = "edit" },
  { mime = "inode/empty", use = "edit" },
  { mime = "image/*", use = ["open", "reveal"] },
  { mime = "{audio,video}/*", use = ["play", "reveal"] },
  { mime = "application/pdf", use = ["open", "reveal"] },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,archive}", use = ["extract", "reveal"] },
]

[tasks]
micro_workers = 10
macro_workers = 20
image_alloc = 536870912
image_bound = [12000, 12000]

[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"
